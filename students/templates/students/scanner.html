<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center mb-4">Barcode/QR Code Scanner</h2>

    <form method="POST" enctype="multipart/form-data" id="scanner-form">
        {% csrf_token %}
        <div class="mb-3">
            <label for="image" class="form-label">Upload Image:</label>
            <input type="file" name="image" id="image" class="form-control" required>
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary">Scan</button>
        </div>
    </form>

    <div class="mt-4" id="results">
        <h4>Results:</h4>
        <ul id="results-list" class="list-group"></ul>
    </div>
</div>

<script>
    document.getElementById('scanner-form').addEventListener('submit', async function(event) {
        event.preventDefault();

        const formData = new FormData(this);
        const response = await fetch("{% url 'scanner' %}", {
            method: 'POST',
            body: formData
        });

        const data = await response.json();
        const resultsList = document.getElementById('results-list');
        resultsList.innerHTML = '';

        data.results.forEach(result => {
            const li = document.createElement('li');
            li.textContent = result;
            li.classList.add('list-group-item');
            resultsList.appendChild(li);
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
