<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center mb-4">Student Details</h2>

    <div class="card">
        <div class="card-body">
            <h5 class="card-title">{{ student.first_name }} {{ student.middle_name }} {{ student.last_name }}</h5>
            <p class="card-text"><strong>Date of Birth:</strong> {{ student.dob }}</p>
            <p class="card-text"><strong>Barcode ID:</strong> {{ student.barcode_id }}</p>
            <p class="card-text"><strong>Status:</strong> {{ student.status }}</p>
        </div>
    </div>

    <div class="text-center mt-4">
        <a href="{% url 'barcode_input' %}" class="btn btn-secondary">Back</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
